# nxlauncher.cfg
# Percorso: $HOME/settings/nxlauncher.cfg (letto da load_cfg() in nxlauncher.c)
#
# Grammatica:
#   # commento                     -> ignorata
#   folder:<nome>                  -> apre una cartella, chiusa da "end"
#   end                            -> chiude la cartella corrente
#   <path>:<label>:<categoria>     -> voce singola (label e categoria opzionali)
#
# Categorie valide: system, user, utility, games, office, other
# (default: user se omessa o non riconosciuta)
#
# <path> supporta "~" (espanso su $HOME a runtime, vedi nxexec_resolve_path()).

# Esempio: una voce diretta in root, fuori da qualunque cartella.
~/bin/mytool:My Tool:utility

# Esempio: una cartella con dentro un paio di programmi utente.
folder:Preferiti
~/bin/notes:Note:office
/bin/lua:Lua:utility
end
